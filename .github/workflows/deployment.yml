name: Deploy App

on:
  push: # PR をマージしたときも、GitHub 上では「マージ先ブランチへの push」が発生
    branches:
      - prod
      - main
      - stage
      - develop
      - feat-**
  pull_request:
    branches: [main, prod, stage]

permissions:
  id-token: write # OIDCトークン取得を許可
  contents: read # Githubリポジトリの読み取り権限

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: ${{ github.ref == 'refs/heads/prod' && 'prod' || github.ref == 'refs/heads/stage' && 'stage' || 'dev' }}
  APP_DIR: frontend

  # ↓　Supabase
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_PROJECT_ID_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_PROJECT_ID_STG || secrets.SUPABASE_PROJECT_ID_DEV }}
  SUPABASE_URL: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_URL_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_URL_STG || secrets.SUPABASE_URL_DEV }}
  SUPABASE_DATABASE_URL: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_DATABASE_URL_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_DATABASE_URL_STG || secrets.SUPABASE_DATABASE_URL_DEV }}
  SUPABASE_DATABASE_PASSWORD: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_DATABASE_PASSWORD_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_DATABASE_PASSWORD_STG || secrets.SUPABASE_DATABASE_PASSWORD_DEV }}
  SUPABASE_SESSION_POOLER_URL: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_SESSION_POOLER_URL_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_SESSION_POOLER_URL_STG || secrets.SUPABASE_SESSION_POOLER_URL_DEV }}
  SUPABASE_ANON_KEY: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_ANON_KEY_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_ANON_KEY_STG || secrets.SUPABASE_ANON_KEY_DEV }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_SERVICE_ROLE_KEY_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_SERVICE_ROLE_KEY_STG || secrets.SUPABASE_SERVICE_ROLE_KEY_DEV }}
  SUPABASE_JWT_SECRET: ${{ github.ref == 'refs/heads/prod' && secrets.SUPABASE_JWT_SECRET_PROD || github.ref == 'refs/heads/stage' && secrets.SUPABASE_JWT_SECRET_STG || secrets.SUPABASE_JWT_SECRET_DEV }}
  # ↑ Supabase

  # ↓ メール送信用
  RESEND_API_KEY: ${{ github.ref == 'refs/heads/prod' && secrets.RESEND_API_KEY_PROD || github.ref == 'refs/heads/stage' && secrets.RESEND_API_KEY_STG || secrets.RESEND_API_KEY_DEV }}
  FROM_EMAIL: ${{ github.ref == 'refs/heads/prod' && vars.FROM_EMAIL_PROD || github.ref == 'refs/heads/stage' && vars.FROM_EMAIL_STG || vars.FROM_EMAIL_DEV }}
  SUPPORT_EMAIL: ${{ github.ref == 'refs/heads/prod' && vars.SUPPORT_EMAIL_PROD || github.ref == 'refs/heads/stage' && vars.SUPPORT_EMAIL_STG || vars.SUPPORT_EMAIL_DEV }}
  # ↑ メール送信用

  # ↓ Descope
  DESCOPE_PROJECT_ID: ${{ github.ref == 'refs/heads/prod' && secrets.DESCOPE_PROJECT_ID_PROD || github.ref == 'refs/heads/stage' && secrets.DESCOPE_PROJECT_ID_STG || secrets.DESCOPE_PROJECT_ID_DEV }}
  DESCOPE_ISSUER: ${{ github.ref == 'refs/heads/prod' && vars.DESCOPE_ISSUER_PROD || github.ref == 'refs/heads/stage' && vars.DESCOPE_ISSUER_STG || vars.DESCOPE_ISSUER_DEV }}
  DESCOPE_AUDIENCE: ${{ github.ref == 'refs/heads/prod' && vars.DESCOPE_AUDIENCE_PROD || github.ref == 'refs/heads/stage' && vars.DESCOPE_AUDIENCE_STG || vars.DESCOPE_AUDIENCE_DEV }}
  DESCOPE_JWKS_URI: ${{ github.ref == 'refs/heads/prod' && vars.DESCOPE_JWKS_URI_PROD || github.ref == 'refs/heads/stage' && vars.DESCOPE_JWKS_URI_STG || vars.DESCOPE_JWKS_URI_DEV }}
  DESCOPE_MGMT_KEY: ${{ github.ref == 'refs/heads/prod' && secrets.DESCOPE_MGMT_KEY_PROD || github.ref == 'refs/heads/stage' && secrets.DESCOPE_MGMT_KEY_STG || secrets.DESCOPE_MGMT_KEY_DEV }}
  # ↑ Descope

  E2E_ENABLED: ${{ (github.ref != 'refs/heads/prod' || github.ref != 'refs/heads/main') && true || false}}
  E2E_SECRET: ${{secrets.E2E_SECRET}}

jobs:
  setup: # 開発環境の準備とNext.jsのビルド
    name: Setup & Build (Next.js)
    runs-on: ubuntu-latest # GitHub提供の Ubuntu環境の仮想マシンで実行
    steps:
      - name: Checkout repository # GitHubリポジトリのソースコードを 仮想マシンにダウンロード
        uses: actions/checkout@v3

      - name: Install Node.js # Next.js 推奨の Node.js 18 をインストール
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Write .env # .envファイルを生成
        uses: ./.github/actions/write-env
        with:
          path: ${{env.APP_DIR}}

      - name: Install dependencies # 依存パッケージのインストール
        run: npm install
        working-directory: ${{env.APP_DIR}}

      - name: Build Next.js App # Next.jsアプリケーションをビルド
        run: npm run build
        working-directory: ${{env.APP_DIR}}

  # 本番環境のSupabaseプロジェクトは手動で作成する
  #　それ以外の環境については全自動でTerraformにて管理する
  deploy: # AWSリソースの作成とVercelへのデプロイ
    name: Deploy Infrastructure and App
    runs-on: ubuntu-latest # GitHub提供の Ubuntu環境の仮想マシンで実行
    needs: setup # 「setup」ジョブが成功した場合にのみ実行

    steps:
      - name: Checkout repository # 「setup」ジョブとは異なるランナーが使用されるので再度ソースコードをダウンロード
        uses: actions/checkout@v3

      - name: Configure AWS Credentials # Github ActionsのAWS認証
        uses: aws-actions/configure-aws-credentials@v2 # GitHub公式のAWS認証アクション を使う（OIDC経由の認証）
        with:
          role-to-assume: arn:aws:iam::${{secrets.TF_AWS_ACCOUNT_ID}}:role/GitHubActionsTerraformRole-${{env.ENVIRONMENT}}
          role-session-name: GitHubActionsTerraformSession
          aws-region: ap-northeast-1

      - name: Setup Terraform # Terraform1.5.0をインストール
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform # Terraform を 初期化 し、リモートバックエンド（S3など）やプロバイダー情報（AWSなど）を取得
        run: terraform init
        working-directory: infra/env/${{env.ENVIRONMENT}}

      - name: Plan Terraform # AWSにどのようなリソースが作成・変更されるかを確認
        run: terraform plan
        working-directory: infra/env/${{env.ENVIRONMENT}}

      - name: Apply Terraform # リソース作成(環境変数としてAWSの認証情報を設定)
        run: terraform apply -auto-approve
        working-directory: infra/env/${{env.ENVIRONMENT}}

      - name: Setup Supabase CLI # Supabase CLIをインストール
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Write .env # .envファイルを生成
        uses: ./.github/actions/write-env
        with:
          path: ${{env.APP_DIR}}

      - name: Prepare Supabase config # Supabaseのconfig.tomlをセットアップ
        run: |
          echo "Using Supabase config for '${{env.ENVIRONMENT}}'"
          cp config.${{env.ENVIRONMENT}}.toml config.toml
        working-directory: ${{env.APP_DIR}}/supabase

      - name: Link Supabase project (non-interactive) #  Supabaseに接続
        run: |
          supabase link --project-ref "${{ env.SUPABASE_PROJECT_ID}}" \
                        --password "${{ env.SUPABASE_DATABASE_PASSWORD }}"
        working-directory: ${{env.APP_DIR}}/supabase

      - name: Run migrations + seed # Supabaseにマイグレーション実行 DB接続はマイグレーション用にSessionPooler（port 5432）を使用
        run: |
          supabase db push --include-seed --db-url "${{env.SUPABASE_SESSION_POOLER_URL}}"
        working-directory: ${{env.APP_DIR}}/supabase

      - name: Deploy to Vercel # Vercelへのデプロイ
        uses: amondnet/vercel-action@v20 # 内部でVercel CLIを自動インストール
        with:
          vercel-token: ${{secrets.VERCEL_TOKEN}}
          vercel-org-id: ${{secrets.VERCEL_TEAM_ID}}
          vercel-project-id: ${{secrets.VERCEL_PROJECT_ID}}
          # main または prod ブランチなら --prod を付けて本番デプロイ
          # それ以外（develop, feat-…）はプレビュー (--yes のみ)
          vercel-args: ${{(env.ENVIRONMENT == 'prod' ||  env.ENVIRONMENT == 'stage') && '--prod --yes' || '--yes' }}
          working-directory: ${{env.APP_DIR}}

      - name: Resolve deployed URL # デプロイURLをjob出力に載せる
        id: resolve
        run: echo "vercel_preview_url=${{ steps.vercel.outputs.preview-url }}" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E (Playwright against deployed URL)
    runs-on: ubuntu-latest
    needs: deploy
    if:
      (github.event_name == 'pull_request' && github.base_ref != 'main' && github.base_ref != 'prod') ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/prod')
    env:
      E2E_BASE_URL: ${{ needs.deploy.outputs.vercel_preview_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./${{env.APP_DIR}}/package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps
        working-directory: ${{env.APP_DIR}}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ${{env.APP_DIR}}

      - name: Wait for deployed app
        run: npx wait-on ${{ env.E2E_BASE_URL}} --timeout 180000
        working-directory: ${{env.APP_DIR}}

      - name: Run E2E
        run: npm run test:e2e
        working-directory: ${{env.APP_DIR}}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{env.APP_DIR}}/playwright-report
          retention-days: 7

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ${{env.APP_DIR}}/test-results
          retention-days: 7
