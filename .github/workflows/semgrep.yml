name: Semgrep (SARIF only)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", ".github/workflows/**"]
  push:
    branches: [main, develop, feat-*]
  workflow_dispatch: # 手動実行できるようにする

permissions:
  contents: read # コードに対する権限
  security-events: write # SARIF アップロード用
  pull-requests: read # プルリクエストに対する権限

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    env:
      OUTPUT_FILE: "semgrep.sarif"

    runs-on: ubuntu-latest
    # 並列性を確保しつつ、他ワークフローとは独立して動く
    container:
      image: semgrep/semgrep:latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      # スキャン対象（.gitignore .semgrepignoreで指定されたファイル群は対象外）
      - uses: actions/checkout@v4

      # ルールキャッシュ（スピードアップ）
      - name: Cache Semgrep rules
        uses: actions/cache@v4
        with:
          path: ~/.cache/semgrep
          key: semgrep-rules-${{ runner.os }}-${{ hashFiles('**/.semgrepignore') }}
          restore-keys: semgrep-rules-

      # スキャン実行
      # ルールは独自で用意することもできるが、既にsemgrepで用意されてるものを使用
      - name: Run Semgrep (SARIF)
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: >
          semgrep scan
          --config=p/owasp-top-ten
          --config=p/typescript
          --config=p/nextjs
          --config=p/secrets
          --config=p/github-actions
          --error
          --sarif-output=${{env.OUTPUT_FILE}}

      - name: Summarize findings
        if: ${{ always() && hashFiles(env.OUTPUT_FILE) != '' }}
        run: |
          echo "## Semgrep summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Baseline : ${BASELINE:-<none>}" >> $GITHUB_STEP_SUMMARY
          echo "ExitCode : ${{ steps.scan.outputs.exitcode }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ERRORS=$(jq '[.runs[].results[]|select(.level=="error")] | length' ${{env.OUTPUT_FILE}})
          WARNS=$(jq '[.runs[].results[]|select(.level=="warning")] | length' ${{env.OUTPUT_FILE}})
          NOTES=$(jq '[.runs[].results[]|select(.level=="note")] | length' ${{env.OUTPUT_FILE}})
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Level | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| ERROR | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
          echo "| WARNING | ${WARNS} |" >> $GITHUB_STEP_SUMMARY
          echo "| NOTE | ${NOTES} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Top results" >> $GITHUB_STEP_SUMMARY
          jq -r '
            .runs[].results[] |
            "\(.level|ascii_upcase) | \(.ruleId) | \(.message.text|gsub("\n";" ")) | \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine)"
          ' ${{env.OUTPUT_FILE}} \
            | head -n 10 \
            | sed '1iLevel | Rule | Message | Location\n----|-----|--------|--------' >> $GITHUB_STEP_SUMMARY

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{env.OUTPUT_FILE}}

      - name: Gate PR if findings
        if: ${{ github.event_name == 'pull_request' && steps.scan.outputs.exitcode != '0' }}
        run: |
          ERRORS=$(jq '[.runs[].results[]|select(.level=="error")] | length' ${{env.OUTPUT_FILE}})
          WARNS=$(jq '[.runs[].results[]|select(.level=="warning")] | length' ${{env.OUTPUT_FILE}})
          echo "::error title=Semgrep gate failed::${ERRORS} errors, ${WARNS} warnings detected. See Security > Code scanning alerts (Semgrep) for details."
          exit 1
