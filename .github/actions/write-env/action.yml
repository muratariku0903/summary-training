name: "Write .env for frontend"
description: "Generate .env (frontend) from current env vars"
inputs:
  path:
    description: "Directory to write the .env file"
    required: true
  filename:
    description: "Dotenv file name"
    default: ".env"

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        set -eu
        out="${{ inputs.path }}/${{ inputs.filename }}"
        mkdir -p "${{ inputs.path }}"
        : > "$out"  # truncate

        # すべて二重引用で安全に埋め込み（ワード分割・グロブ防止）
        printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$SUPABASE_URL"           >> "$out"
        printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY" >> "$out"
        printf 'NEXT_PUBLIC_SUPABASE_PROJECT_ID=%s\n' "$SUPABASE_PROJECT_ID" >> "$out"
        printf 'NEXT_PUBLIC_DESCOPE_PROJECT_ID=%s\n' "$DESCOPE_PROJECT_ID"   >> "$out"

        printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY" >> "$out"
        printf 'SUPABASE_JWT_SECRET=%s\n' "$SUPABASE_JWT_SECRET"             >> "$out"

        printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"   >> "$out"
        printf 'FROM_EMAIL=%s\n' "$FROM_EMAIL"           >> "$out"
        printf 'SUPPORT_EMAIL=%s\n' "$SUPPORT_EMAIL"     >> "$out"

        printf 'DESCOPE_ISSUER=%s\n' "$DESCOPE_ISSUER"   >> "$out"
        printf 'DESCOPE_AUDIENCE=%s\n' "$DESCOPE_AUDIENCE" >> "$out"
        printf 'DESCOPE_JWKS_URI=%s\n' "$DESCOPE_JWKS_URI" >> "$out"
        printf 'DESCOPE_MGMT_KEY=%s\n' "$DESCOPE_MGMT_KEY" >> "$out"

        chmod 600 "$out"
        echo "Wrote dotenv to $out"
