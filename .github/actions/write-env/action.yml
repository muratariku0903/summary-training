name: "Write .env (JS)"
description: "Generate .env for Next.js from environment variables"
inputs:
  path:
    description: "Directory path to write .env"
    default: "frontend"
  filename:
    description: "Dotenv file name"
    default: ".env"
runs:
  using: "node20"
  main: "index.js" # Semgrep の“スクリプト注入”警告回避
